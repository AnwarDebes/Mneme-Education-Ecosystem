<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mneme banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e9d2"/>
      <stop offset="1" stop-color="#ecdfc3"/>
    </linearGradient>
    <pattern id="meander" width="24" height="18" patternUnits="userSpaceOnUse">
      <path d="M 2 16 V 2 H 22 V 9 H 9 V 16 Z" fill="none" stroke="#b3552e" stroke-width="2.2"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="14" fill="url(#bg)"/>
  <rect x="8" y="8" width="1184" height="304" rx="9" fill="none" stroke="#b3552e" stroke-width="2" stroke-opacity="0.6"/>

  <!-- meander borders -->
  <rect x="26" y="18" width="1148" height="18" fill="url(#meander)"/>
  <rect x="26" y="284" width="1148" height="18" fill="url(#meander)"/>

  <!-- wordmark -->
  <text x="60" y="124" font-family="Georgia, 'Times New Roman', serif"
        font-size="64" font-weight="700" fill="#2c2620">mneme</text>
  <text x="63" y="154" font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-style="italic" fill="#b3552e">&#956;&#957;&#942;&#956;&#951;, the muse of memory</text>

  <text x="63" y="196" font-family="Georgia, 'Times New Roman', serif"
        font-size="21" fill="#4a4238">A textbook goes in. An Anki deck comes out.</text>
  <text x="63" y="226" font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-style="italic" fill="#7a6e5c">Every token stays on your machine.</text>

  <!-- footer -->
  <text x="60" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="11.5" fill="#8a7c64" letter-spacing="1.2">PDF / EPUB / MARKDOWN / URL &#183; LOCAL LLM &#183; ANKI + .APKG &#183; 156 TESTS</text>

  <!-- ===== scroll ===== -->
  <rect x="572" y="92" width="78" height="146" fill="#faf3e0" stroke="#cdbb96" stroke-width="1.5"/>
  <rect x="562" y="84" width="98" height="14" rx="7" fill="#e2d2ac" stroke="#b39d6e" stroke-width="1.5"/>
  <rect x="562" y="232" width="98" height="14" rx="7" fill="#e2d2ac" stroke="#b39d6e" stroke-width="1.5"/>
  <g stroke="#9c8c6e" stroke-width="2" stroke-linecap="round">
    <line x1="584" y1="112" x2="638" y2="112"/>
    <line x1="584" y1="128" x2="638" y2="128"/>
    <line x1="584" y1="144" x2="626" y2="144"/>
    <line x1="584" y1="160" x2="638" y2="160"/>
    <line x1="584" y1="176" x2="632" y2="176"/>
    <line x1="584" y1="192" x2="638" y2="192"/>
    <line x1="584" y1="208" x2="618" y2="208"/>
  </g>
  <text x="611" y="262" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-style="italic" fill="#7a6e5c">your textbook</text>

  <!-- arrow -->
  <line x1="668" y1="164" x2="700" y2="164" stroke="#2c2620" stroke-width="2.5"/>
  <path d="M 700 164 l -10 -5 v 10 Z" fill="#2c2620"/>

  <!-- ===== local machine ===== -->
  <rect x="710" y="118" width="122" height="94" rx="10" fill="#fffdf6" stroke="#2c2620" stroke-width="2"/>
  <rect x="722" y="132" width="74" height="22" rx="11" fill="#b3552e"/>
  <text x="759" y="147" text-anchor="middle" font-family="Courier New, monospace"
        font-size="13" fill="#fff7ea">ollama</text>
  <!-- padlock -->
  <rect x="804" y="138" width="16" height="13" rx="3" fill="#2c2620"/>
  <path d="M 807 138 v -5 a 5 5 0 0 1 10 0 v 5" fill="none" stroke="#2c2620" stroke-width="2.2"/>
  <text x="771" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="11.5" fill="#4a4238">local LLM</text>
  <text x="771" y="196" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="11.5" fill="#4a4238">no cloud, no fees</text>
  <text x="771" y="232" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-style="italic" fill="#7a6e5c">runs on your machine</text>

  <!-- arrow -->
  <line x1="842" y1="164" x2="874" y2="164" stroke="#2c2620" stroke-width="2.5"/>
  <path d="M 874 164 l -10 -5 v 10 Z" fill="#2c2620"/>

  <!-- ===== flashcards fan ===== -->
  <g transform="rotate(-6 1000 170)">
    <rect x="892" y="106" width="216" height="124" rx="10" fill="#f5ecd8" stroke="#cdbb96" stroke-width="1.5"/>
  </g>
  <g transform="rotate(5 1020 170)">
    <rect x="908" y="102" width="216" height="124" rx="10" fill="#efe4cb" stroke="#cdbb96" stroke-width="1.5"/>
  </g>
  <rect x="896" y="104" width="222" height="128" rx="10" fill="#fffdf6" stroke="#2c2620" stroke-width="2"/>
  <text x="912" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" font-weight="700" fill="#2c2620">Q: What does ATP stand for?</text>
  <line x1="912" y1="146" x2="1102" y2="146" stroke="#cdbb96" stroke-width="1.5"/>
  <text x="912" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" fill="#4a4238">A: Adenosine triphosphate</text>
  <!-- difficulty pips + rationale -->
  <circle cx="920" cy="206" r="6" fill="#7a9b5e"/>
  <circle cx="938" cy="206" r="6" fill="#cf9b3a"/>
  <circle cx="956" cy="206" r="6" fill="none" stroke="#b3552e" stroke-width="2"/>
  <text x="972" y="211" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="11.5" fill="#b3552e">medium: term recall</text>
</svg>
