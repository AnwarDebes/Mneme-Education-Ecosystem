name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight CI run if a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + types (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy
      - name: Ruff (lint)
        run: ruff check src/ tests/ examples/
      - name: Mypy
        run: mypy src/mneme

  backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server]"
          pip install pytest pytest-cov httpx
      - name: Run pytest with coverage
        run: pytest -q --cov=mneme --cov-report=xml --cov-report=term
        env:
          MNEME_LOG_LEVEL: ERROR
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  cli-smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Verify mneme demo runs end-to-end without Ollama
        run: |
          python -m mneme demo --out-dir ./demo-out
          test -f ./demo-out/photosynthesis.apkg
          test -f ./demo-out/photosynthesis.summary.json

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
